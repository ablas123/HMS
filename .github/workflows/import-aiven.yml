name: Import SQL to Aiven

on:
  push:
    paths:
      - '**/*.sql'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find SQL file
        id: find
        run: |
          sql_file=$(find . -name "*.sql" -type f | head -n 1)
          echo "sql_file=$sql_file" >> $GITHUB_OUTPUT

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Import with primary key disabled
        run: |
          (echo "SET SESSION sql_require_primary_key = 0;" && cat "${{ steps.find.outputs.sql_file }}") | \
          mysql --ssl-mode=REQUIRED \
            -h "mysql-3cb37202-ablas123a-f12a.a.aivencloud.com" \
            -P "10126" \
            -u "avnadmin" \
            -p"AVNS_I0p4cP5M1bz4wkTKW2I" \
            "defaultdb"
          echo "✅ Import completed successfully"
