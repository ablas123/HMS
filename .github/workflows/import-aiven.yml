name: Aiven Compatible Import

on:
  push:
    paths:
      - '**/*.sql'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find SQL file
        id: find
        run: |
          sql_file=$(find . -name "*.sql" -type f | head -n 1)
          echo "sql_file=$sql_file" >> $GITHUB_OUTPUT

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Convert SQL to Aiven-compatible
        run: |
          input="${{ steps.find.outputs.sql_file }}"
          output="aiven_ready.sql"
          
          # نسخ الملف
          cp "$input" "$output"
          
          # 1. تحويل التواريخ الصفرية إلى 1970-01-01
          sed -i "s/'0000-00-00'/'1970-01-01'/g" "$output"
          sed -i "s/'0000-00-00 00:00:00'/'1970-01-01 00:00:00'/g" "$output"
          
          # 2. إضافة IF NOT EXISTS لإنشاء الجداول (لتجنب الأخطاء)
          sed -i 's/CREATE TABLE /CREATE TABLE IF NOT EXISTS /g' "$output"
          
          # 3. إزالة أوامر SET sql_mode
          sed -i '/SET SQL_MODE/d' "$output"
          
          # 4. إزالة الأوامر التي قد تسبب مشكلة (LOCK TABLES)
          sed -i '/LOCK TABLES/d' "$output"
          sed -i '/UNLOCK TABLES/d' "$output"
          
          echo "✅ Conversion done"

      - name: Create database if not exists
        run: |
          mysql -h "mysql-3cb37202-ablas123a-f12a.a.aivencloud.com" \
            -P "10126" -u "avnadmin" -p"AVNS_I0p4cP5M1bz4wkTKW2I" \
            -e "CREATE DATABASE IF NOT EXISTS defaultdb;"

      - name: Import into Aiven
        run: |
          mysql -h "mysql-3cb37202-ablas123a-f12a.a.aivencloud.com" \
            -P "10126" -u "avnadmin" -p"AVNS_I0p4cP5M1bz4wkTKW2I" \
            --force defaultdb < aiven_ready.sql
          echo "✅ Import completed (errors ignored for compatibility)"

      - name: Cleanup
        run: rm -f aiven_ready.sql
