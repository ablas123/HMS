name: Unzip uploaded file

on:
  push:
    paths:
      - '*.zip'
  workflow_dispatch:

jobs:
  unzip-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Extract zip file
        run: |
          # البحث عن أول ملف .zip في جذر المستودع
          zipfile=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$zipfile" ]; then
            echo "No zip file found. Exiting."
            exit 1
          fi
          echo "Found zip file: $zipfile"
          unzip -o "$zipfile"
          rm "$zipfile"

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --staged --quiet || git commit -m 'Extract zip file contents'
          git push
