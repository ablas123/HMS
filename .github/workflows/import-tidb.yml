name: Clean Import to TiDB

on:
  push:
    paths:
      - '**/*.sql'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find SQL file
        id: find
        run: |
          sql_file=$(find . -name "*.sql" -type f | head -n 1)
          echo "sql_file=$sql_file" >> $GITHUB_OUTPUT
          echo "Found: $sql_file"

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Prepare clean database and import
        run: |
          # 1. حذف قاعدة البيانات القديمة (إن وجدت) وإنشاء قاعدة جديدة
          mysql --ssl-mode=REQUIRED \
            -h "gateway01.eu-central-1.prod.aws.tidbcloud.com" \
            -P "4000" \
            -u "4Q3JgFwtV72XTzm.root" \
            -p"H35cOolgETH9RMa4" \
            -e "DROP DATABASE IF EXISTS hms_db; CREATE DATABASE hms_db;"
          
          # 2. تجهيز ملف SQL المعدل
          sed 's/ENGINE=MyISAM/ENGINE=InnoDB/g' "${{ steps.find.outputs.sql_file }}" > tidb_ready.sql
          sed -i "s/'0000-00-00'/NULL/g" tidb_ready.sql
          sed -i "s/'0000-00-00 00:00:00'/NULL/g" tidb_ready.sql
          # إزالة أوامر ALTER TABLE التي تسبب مشكلة AUTO_INCREMENT
          sed -i '/ALTER TABLE.*AUTO_INCREMENT/d' tidb_ready.sql
          
          # 3. استيراد الملف المعدل
          mysql --ssl-mode=REQUIRED \
            -h "gateway01.eu-central-1.prod.aws.tidbcloud.com" \
            -P "4000" \
            -u "4Q3JgFwtV72XTzm.root" \
            -p"H35cOolgETH9RMa4" \
            "hms_db" < tidb_ready.sql
          
          echo "✅ Import completed successfully"

      - name: Cleanup
        run: rm -f tidb_ready.sql
