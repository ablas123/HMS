name: Auto Convert and Import to TiDB

on:
  push:
    paths:
      - '*.sql'
  workflow_dispatch:

jobs:
  convert-and-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find SQL file
        id: find
        run: |
          sql_file=$(ls *.sql 2>/dev/null | head -n 1)
          if [ -z "$sql_file" ]; then
            echo "No SQL file found"
            exit 1
          fi
          echo "sql_file=$sql_file" >> $GITHUB_OUTPUT
          echo "Found: $sql_file"

      - name: Convert MyISAM to InnoDB and latin1 to utf8mb4
        run: |
          input="${{ steps.find.outputs.sql_file }}"
          output="tidb_ready.sql"
          sed 's/ENGINE=MyISAM/ENGINE=InnoDB/g' "$input" > "$output"
          sed -i 's/latin1/utf8mb4/g' "$output"
          sed -i 's/CHARACTER SET latin1/CHARACTER SET utf8mb4/g' "$output"
          echo "Converted file ready: $output"

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Create database if not exists
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS \`$TIDB_DATABASE\`;"

      - name: Import converted SQL to TiDB
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" "$TIDB_DATABASE" < tidb_ready.sql
          echo "✅ Import completed successfully"

      - name: Delete original SQL file (optional)
        run: |
          rm -f "${{ steps.find.outputs.sql_file }}"
          rm -f tidb_ready.sql
          git config user.name 'github-actions[bot]'
          git config user.email 'bot@github.com'
          git add .
          git diff --staged --quiet || git commit -m "Remove SQL files after import"
          git push
