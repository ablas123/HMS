name: Force TiDB Import (Strip ALTER TABLE)

on:
  push:
    paths:
      - '**/*.sql'
  workflow_dispatch:

jobs:
  force-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find SQL file
        id: find
        run: |
          sql_file=$(find . -name "*.sql" -type f | head -n 1)
          echo "sql_file=$sql_file" >> $GITHUB_OUTPUT

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Aggressive SQL cleaning
        run: |
          INPUT="${{ steps.find.outputs.sql_file }}"
          OUTPUT="cleaned.sql"
          
          # نسخ الملف
          cp "$INPUT" "$OUTPUT"
          
          # 1. تحويل MyISAM إلى InnoDB
          sed -i 's/ENGINE=MyISAM/ENGINE=InnoDB/g' "$OUTPUT"
          
          # 2. تحويل الترميز
          sed -i 's/latin1/utf8mb4/g' "$OUTPUT"
          sed -i 's/CHARACTER SET latin1/CHARACTER SET utf8mb4/g' "$OUTPUT"
          
          # 3. حذف أي أمر ALTER TABLE (جميعها غير ضرورية لإنشاء الجداول)
          sed -i '/^ALTER TABLE/d' "$OUTPUT"
          
          # 4. حذف أوامر LOCK/UNLOCK TABLES
          sed -i '/LOCK TABLES/d' "$OUTPUT"
          sed -i '/UNLOCK TABLES/d' "$OUTPUT"
          
          # 5. حذف SET SQL_MODE
          sed -i '/SET SQL_MODE/d' "$OUTPUT"
          
          # 6. حذف تعليقات phpMyAdmin
          sed -i '/\/\*!40101/d' "$OUTPUT"
          
          # 7. تحويل التواريخ الصفرية إلى NULL
          sed -i "s/'0000-00-00'/NULL/g" "$OUTPUT"
          sed -i "s/'0000-00-00 00:00:00'/NULL/g" "$OUTPUT"
          
          echo "✅ Cleaned SQL file ready (no ALTER TABLE statements)"

      - name: Create database
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" \
            -e "DROP DATABASE IF EXISTS \`$TIDB_DATABASE\`; CREATE DATABASE \`$TIDB_DATABASE\`;"

      - name: Import cleaned SQL (ignore errors)
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          # استخدام --force لتجاهل الأخطاء غير الحرجة
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" \
            --force "$TIDB_DATABASE" < cleaned.sql 2> import_errors.log
          
          # طباعة ملخص الأخطاء (إن وجدت)
          if [ -s import_errors.log ]; then
            echo "⚠️ Some errors occurred during import (ignored):"
            cat import_errors.log
          else
            echo "✅ Import completed with no errors."
          fi

      - name: Verify tables
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          echo "Verifying tables in $TIDB_DATABASE:"
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" \
            -e "USE $TIDB_DATABASE; SHOW TABLES;"

      - name: Cleanup
        run: |
          rm -f cleaned.sql import_errors.log
          git config user.name 'github-actions[bot]'
          git config user.email 'bot@github.com'
          git add .
          git diff --staged --quiet || git commit -m "Cleanup after import"
          git push
