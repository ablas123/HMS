name: Auto Convert SQL to TiDB and Import

on:
  push:
    paths:
      - '**/*.sql'
  workflow_dispatch:

jobs:
  convert-and-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find SQL file
        id: find
        run: |
          sql_file=$(find . -name "*.sql" -type f | head -n 1)
          if [ -z "$sql_file" ]; then
            echo "No SQL file found"
            exit 1
          fi
          echo "sql_file=$sql_file" >> $GITHUB_OUTPUT
          echo "Found: $sql_file"

      - name: Convert SQL to TiDB-compatible format
        run: |
          input="${{ steps.find.outputs.sql_file }}"
          output="tidb_ready.sql"
          
          cp "$input" "$output"
          
          sed -i 's/ENGINE=MyISAM/ENGINE=InnoDB/g' "$output"
          sed -i 's/latin1/utf8mb4/g' "$output"
          sed -i 's/CHARACTER SET latin1/CHARACTER SET utf8mb4/g' "$output"
          sed -i 's/CHARSET=latin1/CHARSET=utf8mb4/g' "$output"
          
          sed -i '/ALTER TABLE.*MODIFY COLUMN.*AUTO_INCREMENT/d' "$output"
          sed -i '/ALTER TABLE.*CHANGE COLUMN.*AUTO_INCREMENT/d' "$output"
          sed -i '/ALTER TABLE.*ADD.*AUTO_INCREMENT/d' "$output"
          
          sed -i '/LOCK TABLES/d' "$output"
          sed -i '/UNLOCK TABLES/d' "$output"
          sed -i '/SET SQL_MODE/d' "$output"
          sed -i '/\/\*!40101/d' "$output"
          sed -i '/\/\*!50013/d' "$output"
          sed -i 's/AUTO_INCREMENT=0/AUTO_INCREMENT=1/g' "$output"
          
          echo "â Conversion completed."

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Drop and recreate database (clean import)
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" \
            -e "DROP DATABASE IF EXISTS \`$TIDB_DATABASE\`; CREATE DATABASE \`$TIDB_DATABASE\`;"
          echo "â Database recreated."

      - name: Import converted SQL to TiDB
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
        run: |
          mysql -h "$TIDB_HOST" -P "$TIDB_PORT" -u "$TIDB_USER" -p"$TIDB_PASSWORD" \
            "$TIDB_DATABASE" < tidb_ready.sql
          echo "â Import completed successfully"

      - name: Delete original and temporary SQL files
        run: |
          rm -f "${{ steps.find.outputs.sql_file }}"
          rm -f tidb_ready.sql
          git config user.name 'github-actions[bot]'
          git config user.email 'bot@github.com'
          git add .
          git diff --staged --quiet || git commit -m "Remove SQL files after successful import"
          git push
